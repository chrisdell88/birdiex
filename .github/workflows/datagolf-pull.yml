name: DataGolf round update

# Runs the full per-round DataGolf pipeline for a COMPLETED round via
# scripts/update-round.ts (pull -> build X Scores -> build next-round matchups
# -> grade the round -> refresh headshots -> build ticker), then commits and
# pushes the regenerated src/data files to the branch the workflow ran on.
#
# The frontend wiring lives in src/config/event.ts and
# src/components/ResultsPage.tsx — those already reference the round's data
# files, so once this workflow commits them the app builds and shows the round.
#
# Trigger:
#   - workflow_dispatch — manual run via the GitHub UI; pick the round.
#
# Secrets required:
#   DATAGOLF_API_KEY — DataGolf API key (Repo Settings -> Secrets -> Actions)

on:
  workflow_dispatch:
    inputs:
      slug:
        description: Event slug
        required: true
        default: pga-championship-2026
      round:
        description: Completed round to process
        required: true
        default: '4'
        type: choice
        options: ['1', '2', '3', '4']
      course:
        description: Course slug (must exist in scripts/lib/courses.ts)
        required: true
        default: aronimink
      prefix:
        description: Data-file prefix (e.g. pgaChamp -> pgaChampR4Data)
        required: true
        default: pgaChamp

permissions:
  contents: write

jobs:
  update-round:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run the per-round DataGolf pipeline
        env:
          DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
        run: |
          npm run update:round -- \
            --slug "${{ inputs.slug }}" \
            --round "${{ inputs.round }}" \
            --course "${{ inputs.course }}" \
            --prefix "${{ inputs.prefix }}"

      - name: Verify the production build still passes
        run: npm run build

      - name: Commit regenerated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain src/data/)" ]; then
            echo "No changes in src/data — nothing to commit."
          else
            git add src/data/
            git commit -m "data: ${{ inputs.slug }} round ${{ inputs.round }} update"
            git push
          fi
