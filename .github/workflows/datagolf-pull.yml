name: DataGolf auto-roll (detect round done + advance picks)

# Runs scripts/auto-roll.ts on a schedule. The script:
#   - Pulls fresh data from DataGolf
#   - Reads in-play.json to detect if the current round has finished
#   - If finished: builds new data files, advances event.ts + this workflow's
#                  env block to the next round's picks, commits + pushes.
#   - If not finished: refreshes current data files in place.
#
# Idempotent — safe to run on any cadence. No commit happens if nothing
# changed. Vercel auto-deploys on push to main.
#
# Secrets required:
#   DATAGOLF_API_KEY — DataGolf API key (Repo Settings → Secrets → Actions)

on:
  schedule:
    # Once per hour from 6pm to 12am ET (EDT = UTC-4 → 22-23, 0-4 UTC).
    # Catches round-end states on the PGA Tour. During EST (Nov–Mar) shift
    # these UTC hours by +1 → 23,0-5.
    - cron: '0 22,23,0,1,2,3,4 * * *'
  workflow_dispatch:

# ─── Active event configuration ──────────────────────────────────────────
# auto-roll.ts reads these and detects round transitions on its own.
# When advancing to a new tournament (not a new round in the same event),
# update SLUG / COURSE / SLUG_PREFIX manually.
env:
  SLUG: charles-schwab-challenge-2026
  COURSE: colonial-country-club
  SLUG_PREFIX: csc

permissions:
  contents: write

concurrency:
  group: datagolf-auto-roll
  cancel-in-progress: false

jobs:
  auto-roll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run auto-roll
        env:
          DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
          # Secrets used by scripts/notify.ts when auto-roll fires on a
          # transition. Missing secrets cause that step to log + skip
          # gracefully — auto-roll itself doesn't fail.
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          SITE_URL: ${{ secrets.SITE_URL }}
          SLUG: ${{ env.SLUG }}
          COURSE: ${{ env.COURSE }}
          SLUG_PREFIX: ${{ env.SLUG_PREFIX }}
        run: npx tsx scripts/auto-roll.ts

      - name: Verify TypeScript build still passes
        run: npm run build

      - name: Commit + push if anything changed
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes — skipping commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add src/ .github/workflows/datagolf-pull.yml
          git commit -m "data: auto-roll ${{ env.SLUG }}"
          # Pull --rebase before push to handle the case where another
          # workflow / manual push landed on main during this run.
          # Retries the push once after rebase. If both fail we exit
          # with an error — the pending-notify marker stays so notify
          # NEVER fires before the data is actually on the site.
          if git push; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Push failed — rebasing on origin/main and retrying."
            git pull --rebase origin main
            if git push; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
            else
              echo "Push still failing after rebase. Aborting before notify."
              exit 1
            fi
          fi

      - name: Fire queued notify (only after successful push)
        if: steps.push.outputs.pushed == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          if [ ! -f data/.pending-notify.json ]; then
            echo "No pending notify queued."
            exit 0
          fi
          ROUND=$(jq -r '.picksRound' data/.pending-notify.json)
          MODE=$(jq -r '.mode' data/.pending-notify.json)
          PREV=$(jq -r '.previousBbCount' data/.pending-notify.json)
          npx tsx scripts/notify.ts --round "$ROUND" --mode "$MODE" --previous-bb-count "$PREV"
          rm -f data/.pending-notify.json
