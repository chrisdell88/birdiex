name: Ticker refresh (live scoreboard every 30 min)

# Pulls DataGolf field-updates + in-play, rebuilds src/data/ticker.ts,
# commits + pushes if anything changed. Light-touch â€” does NOT run the
# full round-data / matchups / outrights pipeline (that's the separate
# auto-roll workflow).
#
# The script itself self-gates on whether any player has actually started
# the current round (thru > 0). If no rounds in progress, no commit â†’ no
# deploy.

on:
  schedule:
    # Every 30 minutes during a wide play window: 5am ET (9:00 UTC EDT)
    # to 11pm ET (3:00 UTC next-day EDT). 18-hour daily window covers
    # any PGA Tour start. Outside the window: silent (no firing).
    - cron: '*/30 9-23,0-3 * * *'
  workflow_dispatch: {}

env:
  SLUG: the-memorial-tournament-2026
  # MUST match dataPrefix from src/data/eventSchedule.ts for the current event.
  # auto-roll.ts patches this on event switch. build-ticker.ts FAILS LOUDLY
  # if it's missing instead of silently writing wrong-event files (the bug
  # we hit 2026-06-04â†’06 â€” ticker silently wrote Memorial data into csc*
  # files and never refreshed memorial* matchups/outrights live).
  SLUG_PREFIX: memorial

permissions:
  contents: write

concurrency:
  group: ticker-refresh
  cancel-in-progress: false

jobs:
  refresh-ticker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read picksRound + isComplete from event.ts
        id: cfg
        # Node can't `import` a .ts file without a TS loader, so the previous
        # `node -e import(...)` silently fell back to PICKS=1 every run.
        # Grep the source file directly â€” simple and reliable.
        run: |
          PICKS=$(grep -oE "picksRound:[[:space:]]*[0-9]+" src/config/event.ts | head -1 | grep -oE "[0-9]+" || echo "1")
          COMPLETE=$(grep -oE "isComplete:[[:space:]]*(true|false)" src/config/event.ts | head -1 | grep -oE "(true|false)" || echo "false")
          COMPLETED=$((PICKS - 1))
          if [ "$COMPLETED" -lt 1 ]; then COMPLETED=1; fi
          PHASE="r$COMPLETED"
          if [ "$COMPLETED" -eq 0 ]; then PHASE="pre"; fi
          echo "picks=$PICKS"         >> "$GITHUB_OUTPUT"
          echo "phase=$PHASE"         >> "$GITHUB_OUTPUT"
          echo "completed=$COMPLETED" >> "$GITHUB_OUTPUT"
          echo "complete=$COMPLETE"   >> "$GITHUB_OUTPUT"
          echo "Parsed: picksRound=$PICKS, isComplete=$COMPLETE, phase=$PHASE"

      - name: Pull just field-updates + in-play
        if: steps.cfg.outputs.complete != 'true'
        env:
          DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
        run: |
          # Lightweight pull. Reuses the full pull:event script which
          # fetches more than we need but is the existing reliable path.
          # If this becomes a cost issue we'll write a slim variant.
          npm run pull:event -- --slug "${{ env.SLUG }}" --phase "${{ steps.cfg.outputs.phase }}"

      - name: Rebuild ticker
        if: steps.cfg.outputs.complete != 'true'
        run: |
          npx tsx scripts/build-ticker.ts \
            --slug "${{ env.SLUG }}" \
            --phase "${{ steps.cfg.outputs.phase }}" \
            --round "${{ steps.cfg.outputs.picks }}"

      - name: Skip ticker refresh â€” tournament complete
        if: steps.cfg.outputs.complete == 'true'
        run: |
          echo "isComplete=true in event.ts â€” skipping ticker pull + rebuild."
          echo "The ticker is hidden in the UI when isComplete=true; nothing to refresh."

      - name: Verify build still passes
        run: npm run build

      - name: Commit + push if ticker changed
        if: steps.cfg.outputs.complete != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet src/data/ticker.ts; then
            echo "Ticker unchanged â€” skipping commit."
          else
            git add src/data/ticker.ts
            git commit -m "ticker: refresh live scores"
            git push
          fi
